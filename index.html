<script>
/**
 * SPOTTER-PRO CORE LOGIC
 */

const state = {
    myCoords: null,
    potaEnabled: true,
    sotaEnabled: true,
    filters: {
        dist: 5000,
        band: 'all',
        mode: 'all',
        callsign: ''
    },
    knownSpots: new Set(),
    nextScan: 60
};

// --- Maidenhead Converter ---
function gridToCoords(grid) {
    if (!grid || grid.length < 4) return null;
    grid = grid.toUpperCase();
    
    let lon = (grid.charCodeAt(0) - 65) * 20 - 180;
    let lat = (grid.charCodeAt(1) - 65) * 10 - 90;
    lon += (grid.charCodeAt(2) - 48) * 2;
    lat += (grid.charCodeAt(3) - 48) * 1;
    
    if (grid.length >= 6) {
        lon += (grid.charCodeAt(4) - 65) * (2/24) + (1/24);
        lat += (grid.charCodeAt(5) - 65) * (1/24) + (0.5/24);
    } else {
        lon += 1; 
        lat += 0.5;
    }
    return { lat, lon };
}

// --- Grid Scraper from Comments ---
function extractGrid(text) {
    if (!text) return null;
    // Look for 4/6 char grid patterns e.g. "FN31", "IO91ab", etc.
    const re = /\b([A-R]{2}[0-9]{2}([A-X]{2})?)\b/i;
    const match = text.match(re);
    return match ? match[1].toUpperCase() : null;
}

// --- Haversine Distance ---
function calculateDistance(c1, c2) {
    if (!c1 || !c2) return null;
    const R = 3958.8; // Miles
    const dLat = (c2.lat - c1.lat) * Math.PI / 180;
    const dLon = (c2.lon - c1.lon) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(c1.lat * Math.PI / 180) * Math.cos(c2.lat * Math.PI / 180) * 
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return Math.round(R * c);
}

function calculateBearing(c1, c2) {
    if (!c1 || !c2) return null;
    const l1 = c1.lat * Math.PI / 180;
    const l2 = c2.lat * Math.PI / 180;
    const dl = (c2.lon - c1.lon) * Math.PI / 180;
    const y = Math.sin(dl) * Math.cos(l2);
    const x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// --- GPS to Maidenhead ---
function coordsToGrid(lat, lon) {
    lon += 180;
    lat += 90;
    
    const f1 = String.fromCharCode(65 + Math.floor(lon / 20));
    const f2 = String.fromCharCode(65 + Math.floor(lat / 10));
    const s1 = Math.floor((lon % 20) / 2);
    const s2 = Math.floor(lat % 10);
    const t1 = String.fromCharCode(97 + Math.floor((lon % 2) * 12));
    const t2 = String.fromCharCode(97 + Math.floor((lat % 1) * 24));
    
    return `${f1}${f2}${s1}${s2}${t1}${t2}`;
}

// --- Freq to Band Helper ---
function freqToBand(val) {
    let f = parseFloat(val);
    if (isNaN(f)) return "";
    if (f < 1000) f = f * 1000; // Convert MHz to kHz if needed
    
    if (f >= 1800 && f <= 2000) return "160m";
    if (f >= 3500 && f <= 4000) return "80m";
    if (f >= 5330 && f <= 5410) return "60m";
    if (f >= 7000 && f <= 7300) return "40m";
    if (f >= 10100 && f <= 10150) return "30m";
    if (f >= 14000 && f <= 14350) return "20m";
    if (f >= 18068 && f <= 18168) return "17m";
    if (f >= 21000 && f <= 21450) return "15m";
    if (f >= 24890 && f <= 24990) return "12m";
    if (f >= 28000 && f <= 29700) return "10m";
    if (f >= 50000 && f <= 54000) return "6m";
    if (f >= 144000 && f <= 148000) return "2m";
    if (f >= 420000 && f <= 450000) return "70cm";
    return "";
}

function normalizeBand(b) {
    if (!b) return "";
    b = b.toString().toLowerCase().trim();
    if (!b.endsWith('m') && !b.endsWith('cm')) b += 'm';
    return b;
}

// --- Morse Audio Engine ---
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playMorse(pattern) {
    if (!audioCtx || !document.getElementById('audio-alerts').checked) return;
    initAudio();
    
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(700, now);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    let time = now;
    const dit = 0.08;
    const dah = dit * 3;
    
    pattern.split('').forEach(char => {
        const dur = (char === '.') ? dit : dah;
        gain.gain.setValueAtTime(0.15, time);
        gain.gain.setValueAtTime(0, time + dur);
        time += dur + dit;
    });
    
    osc.start(now);
    osc.stop(time);
}

function useGPS() {
    if (!navigator.geolocation) return alert("Geolocation not supported");
    navigator.geolocation.getCurrentPosition(pos => {
        const grid = coordsToGrid(pos.coords.latitude, pos.coords.longitude);
        document.getElementById('grid').value = grid;
        updateConfig();
        fetchSpots();
    });
}

// --- State/Province centers for approx POTA distance ---

    'US-NM': {lat: 34.51, lon: -105.87}, 'US-NY': {lat: 43.29, lon: -74.21}, 'US-NC': {lat: 35.75, lon: -79.01},
    'US-ND': {lat: 47.55, lon: -101.00}, 'US-OH': {lat: 40.41, lon: -82.90}, 'US-OK': {lat: 35.00, lon: -98.00},
    'US-OR': {lat: 43.80, lon: -120.55}, 'US-PA': {lat: 41.20, lon: -77.19}, 'US-RI': {lat: 41.58, lon: -71.47},
    'US-SC': {lat: 33.83, lon: -81.16}, 'US-SD': {lat: 44.36, lon: -100.35}, 'US-TN': {lat: 35.51, lon: -86.58},
    'US-TX': {lat: 31.96, lon: -99.90}, 'US-UT': {lat: 39.32, lon: -111.09}, 'US-VT': {lat: 44.55, lon: -72.57},
    'US-VA': {lat: 37.43, lon: -78.65}, 'US-WA': {lat: 47.75, lon: -120.74}, 'US-WV': {lat: 38.59, lon: -80.45},
    'US-WI': {lat: 43.78, lon: -88.78}, 'US-WY': {lat: 43.07, lon: -107.29},
    // Canadian Provinces
    'CA-AB': {lat: 53.93, lon: -116.57}, 'CA-BC': {lat: 53.72, lon: -127.64}, 'CA-ON': {lat: 51.25, lon: -85.32},
    'CA-QC': {lat: 52.93, lon: -73.54}, 'CA-NS': {lat: 44.68, lon: -63.74},
    // International
    'VK': {lat: -25.27, lon: 133.77}, 'ZL': {lat: -40.90, lon: 174.88}, 'G': {lat: 55.37, lon: -3.43},
    'DL': {lat: 51.16, lon: 10.45}, 'F': {lat: 46.22, lon: 2.21}, 'I': {lat: 41.87, lon: 12.56},
    'EA': {lat: 40.46, lon: -3.74}, 'VE': {lat: 56.13, lon: -106.34}, 'JA': {lat: 36.20, lon: 138.25}

const stateAlias = {
    'arkansas': 'US-AR', 'idaho': 'US-ID', 'texas': 'US-TX', 'california': 'US-CA',
    'oklahoma': 'US-OK', 'florida': 'US-FL', 'ontario': 'CA-ON', 'quebec': 'CA-QC', 'alaska': 'US-AK'
};

// --- API FETCH ---
async function fetchSpots() {
    const indicator = document.getElementById('scanning-indicator');
    if (indicator) indicator.classList.add('active');

    let allSpots = [];
    try {
        if (state.potaEnabled) {
            const response = await fetch('https://api.pota.app/spot/');
            const data = await response.json();
            data.forEach(s => {
                const scrapedGrid = extractGrid(s.comments);
                let coords = scrapedGrid ? gridToCoords(scrapedGrid) : null;
                
                if (!coords && s.locationDesc) {
                    const cleanDesc = s.locationDesc.trim();
                    coords = regionCenters[cleanDesc] || regionCenters[stateAlias[cleanDesc.toLowerCase()]];
                }
                
                allSpots.push({
                    id: `pota-${s.spotId}`,
                    source: 'pota', activator: s.activator, ref: s.reference, locationName: s.name,
                    freq: s.frequency, band: normalizeBand(s.band || freqToBand(s.frequency)),
                    mode: s.mode, time: s.spotTime.replace(' ', 'T'),
                    lat: coords ? coords.lat : null, lon: coords ? coords.lon : null,
                    comments: s.comments
                });
            });
        }

        // 2. Fetch SOTA
        if (state.sotaEnabled) {
            const response = await fetch('https://api2.sota.org.uk/api/spots/20');
            const data = await response.json();
            data.forEach(s => {
                const scrapedGrid = extractGrid(s.comments);
                const coords = scrapedGrid ? gridToCoords(scrapedGrid) : null;
                allSpots.push({
                    id: `sota-${s.id}`,
                    source: 'sota', activator: s.activatorCallsign,
                    ref: s.associationCode + '/' + s.summitCode, locationName: s.summitName,
                    freq: s.frequency, band: normalizeBand(freqToBand(s.frequency)),
                    mode: s.mode, time: s.timeStamp.replace(' ', 'T'),
                    lat: coords ? coords.lat : null, lon: coords ? coords.lon : null,
                    comments: s.comments
                });
            });
        }
        window.currentSpots = allSpots;
        renderSpots(allSpots);
    } catch (err) {
        console.error("Fetch failed", err);
    } finally {
        if (indicator) indicator.classList.remove('active');
        document.getElementById('last-update').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        state.nextScan = 60; 
    }
}

function renderSpots(spots) {
    const container = document.getElementById('spot-container');
    const potaLabel = document.getElementById('pota-count');
    const sotaLabel = document.getElementById('sota-count');
    
    // Sort by UTC time
    spots.sort((a, b) => Date.parse(b.time) - Date.parse(a.time));

    // Calculate Distance
    spots.forEach(s => {
        if (s.lat && s.lon && state.myCoords) {
            s.distance = calculateDistance(state.myCoords, { lat: s.lat, lon: s.lon });
            s.bearing = calculateBearing(state.myCoords, { lat: s.lat, lon: s.lon });
        }
    });

    // Apply Filters
    const filtered = spots.filter(s => {
        // Distance filter
        if (s.distance && s.distance > state.filters.dist) return false;
        
        // Band filter
        if (state.filters.band !== 'all' && s.band !== state.filters.band) return false;

        // Callsign filter
        if (state.filters.callsign) {
            const target = state.filters.callsign.toUpperCase().trim();
            if (s.activator.toUpperCase().indexOf(target) === -1) return false;
        }

        // Mode filter
        if (state.filters.mode !== 'all' && s.mode !== state.filters.mode) {
            // Loose matching for modes
            if (state.filters.mode === 'DIGITAL' && !['FT8','JS8'].includes(s.mode)) return false;
            if (state.filters.mode === 'SSB' && s.mode !== 'SSB' && s.mode !== 'USB' && s.mode !== 'LSB') return false;
            if (state.filters.mode === 'CW' && s.mode !== 'CW') return false;
        }
        return true;
    });

    container.innerHTML = '';
    let pCount = 0, sCount = 0;

    filtered.forEach(s => {
        if (s.source === 'pota') pCount++; else sCount++;
        
        const card = document.createElement('div');
        const isNew = !state.knownSpots.has(s.id);
        
        if (isNew) {
            state.knownSpots.add(s.id);
            // Only play alert if not initial load
            if (state.initialized) {
                const morse = s.source === 'pota' ? ".--." : "..."; // P or S
                playMorse(morse);
            }
        }

        card.className = `spot-card ${isNew ? 'new' : ''}`;
        
        const distText = s.distance ? `${s.distance} mi • ${Math.round(s.bearing)}°` : '-- mi';
        const now = new Date().getTime();
        const spotDate = Date.parse(s.time.endsWith('Z') ? s.time : s.time + 'Z');
        const timeDiff = Math.max(0, Math.floor((now - spotDate) / 60000));
        const timeText = timeDiff <= 0 ? 'Just now' : `${timeDiff}m ago`;

        card.innerHTML = `
            <div class="spot-source source-${s.source}">${s.source}</div>
            <div class="spot-main">
                <div class="activator">${s.activator}</div>
                <div class="location">${s.ref} - ${s.locationName || ''}</div>
                ${s.comments ? `<div style="font-size: 0.7rem; color: #768390; margin-top: 4px;">"${s.comments}"</div>` : ''}
            </div>
            <div class="freq-info">
                <div class="frequency">${s.freq}</div>
                <div class="mode">${s.mode}</div>
            </div>
            <div class="metadata">
                <div class="distance-tag" style="${s.distance ? '' : 'opacity:0.3'}">📍 ${distText}</div>
                <div class="time-tag">🕒 ${timeText}</div>
                <div style="display:flex; gap: 8px;">
                    ${s.lat ? `<button class="action" style="background:#1c2128; border:1px solid #444c56;" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lon}', '_blank')">🗺️ MAP</button>` : ''}
                    <button class="action" onclick="copyValue('${s.freq}')">📋 COPY FREQ</button>
                </div>
            </div>
        `;
        container.appendChild(card);
    });

    potaLabel.innerText = pCount;
    sotaLabel.innerText = sCount;
}

// --- UI Interaction ---
function updateConfig() {
    const grid = document.getElementById('grid').value;
    const call = document.getElementById('callsign').value;
    const watch = document.getElementById('callsign-filter').value;
    state.myCoords = gridToCoords(grid);
    state.filters.callsign = watch;
    localStorage.setItem('grid', grid);
    localStorage.setItem('callsign', call);
    localStorage.setItem('watch_call', watch);
}

// --- Initialization ---
function initConfig() {
    const savedGrid = localStorage.getItem('grid') || 'FN31pr';
    const savedCall = localStorage.getItem('callsign') || 'K1ABC';
    const savedWatch = localStorage.getItem('watch_call') || '';
    document.getElementById('grid').value = savedGrid;
    document.getElementById('callsign').value = savedCall;
    document.getElementById('callsign-filter').value = savedWatch;
    state.myCoords = gridToCoords(savedGrid);
    state.filters.callsign = savedWatch;
    
    // Initial fetch to populate known set without beeping
    state.initialized = false;
    fetchSpots().then(() => {
        state.initialized = true;
    });
}

// --- Copy Workaround (Legacy Support) ---
function copyValue(val) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(val);
    } else {
        const temp = document.createElement('textarea');
        temp.value = val;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
    }
    
    // Feedback
    const status = document.getElementById('copy-status');
    status.innerText = `${val} MHz Copied!`;
    status.classList.add('visible');
    setTimeout(() => status.classList.remove('visible'), 2000);
}

document.getElementById('refresh-btn').onclick = fetchSpots;

document.getElementById('pota-toggle').onclick = (e) => {
    state.potaEnabled = !state.potaEnabled;
    e.target.classList.toggle('active');
    fetchSpots();
};

document.getElementById('sota-toggle').onclick = (e) => {
    state.sotaEnabled = !state.sotaEnabled;
    e.target.classList.toggle('active');
    fetchSpots();
};

document.getElementById('grid').onchange = () => {
    updateConfig();
    fetchSpots();
};

document.getElementById('callsign').onchange = () => {
    updateConfig();
};

document.getElementById('band-filter').onchange = (e) => {
    state.filters.band = e.target.value;
    fetchSpots();
};

document.getElementById('mode-filter').onchange = (e) => {
    state.filters.mode = e.target.value;
    fetchSpots();
};

document.getElementById('dist-limit').onchange = (e) => {
    state.filters.dist = parseInt(e.target.value);
    fetchSpots();
};

document.getElementById('callsign-filter').oninput = (e) => {
    state.filters.callsign = e.target.value;
    updateConfig();
    renderSpots(window.currentSpots || []);
};

document.getElementById('audio-alerts').onchange = () => {
    initAudio(); // Prompt browser permission
};

// Initial Load
initConfig();
// Timer loop
setInterval(() => {
    state.nextScan--;
    if (state.nextScan <= 0) {
        fetchSpots();
    }
    document.getElementById('next-update').innerText = state.nextScan + 's';
}, 1000);

</script>
