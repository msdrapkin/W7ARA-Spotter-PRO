<script>
const state = {
    potaEnabled: true,
    sotaEnabled: true,
    myCoords: null,
    knownSpots: new Set(),
    initialized: false,
    filters: { dist: 5000, band: 'all', mode: 'all', callsign: '' }
};

// --- Utils ---
function gridToCoords(grid) {
    if (!grid || grid.length < 4) return null;
    grid = grid.toUpperCase();
    const lon = (grid.charCodeAt(0) - 65) * 20 + (grid.charCodeAt(2) - 48) * 2 - 180 + 1;
    const lat = (grid.charCodeAt(1) - 65) * 10 + (grid.charCodeAt(3) - 48) - 90 + 0.5;
    return { lat, lon };
}

function calculateDistance(c1, c2) {
    const R = 3958.8; // Miles
    const dLat = (c2.lat - c1.lat) * Math.PI / 180;
    const dLon = (c2.lon - c1.lon) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(c1.lat * Math.PI / 180) * Math.cos(c2.lat * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

function calculateBearing(c1, c2) {
    const y = Math.sin((c2.lon - c1.lon) * Math.PI / 180) * Math.cos(c2.lat * Math.PI / 180);
    const x = Math.cos(c1.lat * Math.PI / 180) * Math.sin(c2.lat * Math.PI / 180) -
              Math.sin(c1.lat * Math.PI / 180) * Math.cos(c2.lat * Math.PI / 180) * Math.cos((c2.lon - c1.lon) * Math.PI / 180);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function extractGrid(str) {
    const match = str ? str.match(/[A-R]{2}[0-9]{2}[a-z]{2}/i) || str.match(/[A-R]{2}[0-9]{2}/i) : null;
    return match ? match[0] : null;
}

function freqToBand(f) {
    f = parseFloat(f) * 1000; // kHz
    if (f >= 1800 && f <= 2000) return "160m";
    if (f >= 3500 && f <= 4000) return "80m";
    if (f >= 7000 && f <= 7300) return "40m";
    if (f >= 10100 && f <= 10150) return "30m";
    if (f >= 14000 && f <= 14350) return "20m";
    if (f >= 18068 && f <= 18168) return "17m";
    if (f >= 21000 && f <= 21450) return "15m";
    if (f >= 24890 && f <= 24990) return "12m";
    if (f >= 28000 && f <= 29700) return "10m";
    if (f >= 50000 && f <= 54000) return "6m";
    if (f >= 144000 && f <= 148000) return "2m";
    return "";
}

function normalizeBand(b) {
    if (!b) return "";
    b = b.toString().toLowerCase().trim();
    if (!b.endsWith('m') && !b.endsWith('cm')) b += 'm';
    return b;
}

// --- Morse Audio Engine ---
let audioCtx = null;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playMorse(pattern) {
    if (!audioCtx || !document.getElementById('audio-alerts').checked) return;
    initAudio();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const dit = 0.092; // 13 WPM
    osc.type = 'sine'; osc.frequency.setValueAtTime(700, now);
    osc.connect(gain); gain.connect(audioCtx.destination);
    let time = now;
    pattern.split('').forEach(char => {
        const dur = (char === '.') ? dit : dit * 3;
        gain.gain.setValueAtTime(0.15, time); gain.gain.setValueAtTime(0, time + dur);
        time += dur + dit;
    });
    osc.start(now); osc.stop(time);
}

// --- API ---
async function fetchSpots() {
    const indicator = document.getElementById('scanning-indicator');
    if (indicator) indicator.classList.add('active');
    let allSpots = [];
    try {
        if (state.potaEnabled) {
            const r = await fetch('https://api.pota.app/spot/');
            const d = await r.json();
            d.forEach(s => {
                const g = extractGrid(s.comments);
                let c = g ? gridToCoords(g) : null;
                if (!c && s.locationDesc) c = regionCenters[s.locationDesc.trim()];
                allSpots.push({ id: `pota-${s.spotId}`, source: 'pota', activator: s.activator, ref: s.reference, freq: s.frequency, mode: s.mode, time: s.spotTime.replace(' ', 'T'), lat: c?c.lat:null, lon: c?c.lon:null, comments: s.comments });
            });
        }
        if (state.sotaEnabled) {
            const r = await fetch('https://api2.sota.org.uk/api/spots/20');
            const d = await r.json();
            d.forEach(s => {
                const assoc = s.associationCode;
                const c = regionCenters[assoc];
                allSpots.push({ id: `sota-${s.id}`, source: 'sota', activator: s.activatorCallsign, ref: s.associationCode + '/' + s.summitCode, freq: s.frequency, mode: s.mode, time: s.timeStamp, lat: c?c.lat:null, lon: c?c.lon:null, comments: s.comments });
            });
        }
        window.currentSpots = allSpots;
        renderSpots(allSpots);
    } catch(e) { console.error(e); }
    setTimeout(() => { if (indicator) indicator.classList.remove('active'); }, 1000);
}


function renderSpots(spots) {
    const container = document.getElementById('spot-container');
    
    // First pass: calculate distances/bearings and normalize data for EVERY spot
    spots.forEach(s => { 
        if (s.lat && state.myCoords) { 
            s.distance = calculateDistance(state.myCoords, s); 
            s.bearing = calculateBearing(state.myCoords, s); 
        } 
        s.calculatedBand = freqToBand(s.freq);
    });
    
    // Comprehensive filter logic
    const filtered = spots.filter(s => {
        // Source Filter
        if (s.source === 'pota' && !state.potaEnabled) return false;
        if (s.source === 'sota' && !state.sotaEnabled) return false;

        // Distance Filter
        if (state.filters.dist && s.distance && s.distance > state.filters.dist) return false;

        // Callsign Filter
        if (state.filters.callsign && !s.activator.toUpperCase().includes(state.filters.callsign.toUpperCase())) return false;

        // Band Filter
        if (state.filters.band !== 'all') {
            if (state.filters.band === 'vHF') {
                if (!['6m', '2m'].includes(s.calculatedBand)) return false;
            } else if (s.calculatedBand !== state.filters.band) {
                return false;
            }
        }

        // Mode Filter
        if (state.filters.mode !== 'all') {
            const m = s.mode.toUpperCase();
            if (state.filters.mode === 'SSB' && !m.includes('SSB') && !m.includes('PHONE') && !m.includes('FM')) return false;
            if (state.filters.mode === 'CW' && !m.includes('CW')) return false;
            if (state.filters.mode === 'DIGITAL' && !m.includes('FT8') && !m.includes('JS8') && !m.includes('RTTY')) return false;
        }

        return true;
    });

    container.innerHTML = '';
    filtered.forEach(s => {
        const isNew = !state.knownSpots.has(s.id);
        if (isNew) { state.knownSpots.add(s.id); if (state.initialized) playMorse(s.source === 'pota' ? '.--.' : '...'); }
        const card = document.createElement('div');
        card.className = `spot-card ${isNew ? 'new' : ''}`;
        card.innerHTML = `
            <div class="spot-source source-${s.source}">${s.source}</div>
            <div class="spot-main">
                <div class="activator"><a href="https://www.qrz.com/db/${s.activator}" target="_blank">${s.activator} 🔍</a></div>
                <div style="font-size:0.75rem opacity:0.8;">${s.ref}</div>
            </div>
            <div class="freq-info">
                <div class="frequency">${s.freq}</div>
                <div class="mode">${s.mode}</div>
            </div>
            <div class="metadata">
                <div>📍 ${s.distance || '--'} mi</div>
                <div style="display:flex; gap:6px;">
                    ${s.lat ? `<button class="action" style="padding:4px 8px; min-height:32px; background:#1c2128;" onclick="window.open('https://maps.google.com/?q=${s.lat},${s.lon}')">🗺️</button>` : ''}
                    <button class="action" onclick="copyVal('${s.freq}')" style="padding:4px 8px; min-height:32px;">📋</button>
                </div>
            </div>
        `;
        container.appendChild(card);
    });
}

function copyVal(v) {
    navigator.clipboard.writeText(v);
    const s = document.getElementById('copy-status');
    s.classList.add('visible');
    setTimeout(() => s.classList.remove('visible'), 2000);
}


// --- Event Listeners ---
function updateState() {
    const gridVal = document.getElementById('grid').value;
    state.myCoords = gridToCoords(gridVal);
    state.filters.callsign = document.getElementById('callsign-filter').value;
    state.filters.dist = parseInt(document.getElementById('dist-limit').value) || 5000;
    state.filters.band = document.getElementById('band-filter').value;
    state.filters.mode = document.getElementById('mode-filter').value;
    renderSpots(window.currentSpots || []);
}

document.querySelectorAll('.sidebar input, .sidebar select').forEach(el => {
    el.addEventListener('input', updateState);
});

document.getElementById('pota-toggle').onclick = (e) => {
    state.potaEnabled = !state.potaEnabled;
    e.target.classList.toggle('active');
    fetchSpots();
};

document.getElementById('sota-toggle').onclick = (e) => {
    state.sotaEnabled = !state.sotaEnabled;
    e.target.classList.toggle('active');
    fetchSpots();
};

// --- Copy & UI ---
function copyVal(v) {
    navigator.clipboard.writeText(v).then(() => {
        const s = document.getElementById('copy-status');
        s.classList.add('visible');
        setTimeout(() => s.classList.remove('visible'), 2000);
    });
}

function toggleSidebar() { 
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.toggle('open');
    if (overlay) overlay.classList.toggle('active');
}

function useGPS() {
    if (!navigator.geolocation) return alert("GPS not supported");
    navigator.geolocation.getCurrentPosition(p => {
        // Find grid from lat/lon
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        // Simple grid calculation (6-char)
        const char1 = String.fromCharCode(Math.floor((lon + 180) / 20) + 65);
        const char2 = String.fromCharCode(Math.floor((lat + 90) / 10) + 65);
        const char3 = Math.floor(((lon + 180) % 20) / 2).toString();
        const char4 = Math.floor((lat + 90) % 10).toString();
        const grid = char1 + char2 + char3 + char4;
        document.getElementById('grid').value = grid;
        updateState();
    });
}

// Countdown timer logic
let nextUpdate = 60;
setInterval(() => {
    nextUpdate--;
    if (nextUpdate <= 0) {
        nextUpdate = 60;
        fetchSpots();
    }
    document.getElementById('next-update').innerText = nextUpdate + "s";
}, 1000);

// --- Initialization ---
window.onload = () => {
    // Check if we have a saved grid
    const savedGrid = localStorage.getItem('ara-spotter-grid');
    if (savedGrid) document.getElementById('grid').value = savedGrid;
    
    // Initial fetch
    updateState();
    state.initialized = false;
    fetchSpots().then(() => {
        state.initialized = true;
    });
};

// Persist grid
document.getElementById('grid').addEventListener('change', (e) => {
    localStorage.setItem('ara-spotter-grid', e.target.value);
});

// --- PWA Registration ---
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker registered', reg))
            .catch(err => console.log('Service Worker failed', err));
    });
}
</script>
